<section class="card">
	<form
		class="card_header"
		action="{{ url_for('clear_downloads_button') }}"
		method="get">
		<h2 class="title">Downloads</h2>
		<button
			id="clear-scrape-btn"
			class="clear_button"
			type="submit">
			clear downloaded
		</button>
	</form>
	{% if downloads %}
	<ul class="grid">
		{% for download in downloads %}
		<li>
			<a
				href="{{ url_for('downloaded_image', filename=download) }}"
				target="_blank"
				rel="noopener noreferrer">
				<img
					src="{{ url_for('downloaded_image', filename=download) }}"
					alt="{{ download }}"
					class="image"
			/></a>
		</li>
		{% endfor %}
	</ul>
	{% else %}
	<p>No analyzed images yet.</p>
	{% endif %}
</section>
