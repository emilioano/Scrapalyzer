<section class="card">
	<form
		class="card_header"
		action="{{ url_for('clear_analyzed_button') }}"
		method="get">
		<h2 class="title">Analyzed</h2>
		<button
			id="clear-analyzed-btn"
			class="clear_button"
			type="submit">
			clear analyzed
		</button>
	</form>
	{% if categories %} {% for category in categories %}
	<div class="category-block">
		<h3 class="subtitle">{{ category.name }}</h3>
		<ul class="grid">
			{% for file in category.files %}
			<li>
				<a
					href="{{ url_for('analyzed_image', filename=file) }}"
					target="_blank"
					rel="noopener noreferrer">
					<img
						src="{{ url_for('analyzed_image', filename=file) }}"
						alt="{{ file }}"
						class="image"
				/></a>
			</li>
			{% else %}
			<li>No images in this category.</li>
			{% endfor %}
		</ul>
	</div>
	{% endfor %} {% else %}
	<p>No analyzed categories yet.</p>
	{% endif %}
</section>
